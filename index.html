<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#0b0b0e">
<title>Habit Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0b0b0e;
  --s1:       #13131a;
  --s2:       #1a1a24;
  --s3:       #22222f;
  --border:   #2c2c3e;
  --text:     #e8e8f4;
  --muted:    #55556e;
  --accent:   #7c6af7;
  --a2:       #a78bfa;
  --glow:     rgba(124,106,247,0.22);
  --green:    #4ade80;
  --yellow:   #fbbf24;
  --red:      #f87171;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* ── Layout shells ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
}

.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(72px + var(--safe-bot));
}
.screen.active { display: block; }

/* scrollbar */
.screen::-webkit-scrollbar { width: 3px; }
.screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--text) 50%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.month-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 14px;
}

.month-pill button {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
}

.month-pill .ml {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  min-width: 90px;
  text-align: center;
}

/* ── Stats strip ── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 16px;
}

.stat {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 12px;
  text-align: center;
  transition: border-color 0.2s;
}
.stat:hover { border-color: var(--accent); }

.stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.stat-lbl {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── Add habit bar ── */
.add-bar {
  display: flex;
  gap: 8px;
  padding: 0 16px 12px;
}

.add-bar input {
  flex: 1;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-width: 0;
}
.add-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
}
.add-bar input::placeholder { color: var(--muted); }

.emoji-btn {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0 14px;
  font-size: 1.2rem;
  cursor: pointer;
  transition: border-color 0.2s;
}
.emoji-btn:active { opacity: 0.7; }

.add-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 0 18px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}
.add-btn:active { opacity: 0.8; box-shadow: 0 0 20px var(--glow); }

/* ── Emoji picker ── */
.epicker {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 16px;
  background: var(--s2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.epicker.open { display: flex; }
.epicker span {
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px;
  border-radius: 8px;
  transition: background 0.15s;
}
.epicker span:active { background: var(--s3); }

/* ── Habit list ── */
.habit-cards {
  padding: 4px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hcard {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.93) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.hcard-top {
  display: flex;
  align-items: center;
  padding: 12px 14px 8px;
  gap: 10px;
}

.hcard-emoji { font-size: 1.3rem; flex-shrink: 0; }

.hcard-name {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hcard-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.streak-badge {
  font-size: 0.7rem;
  font-family: 'DM Mono', monospace;
  color: var(--yellow);
  background: rgba(251,191,36,0.12);
  padding: 2px 8px;
  border-radius: 20px;
}

.pct-text {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--accent);
}

.del-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.85rem;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: color 0.15s;
  line-height: 1;
}
.del-btn:active { color: var(--red); }

/* Progress bar */
.prog-bar {
  height: 3px;
  background: var(--s3);
  margin: 0 14px 10px;
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--a2));
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Day dots row */
.dots-scroll {
  overflow-x: auto;
  padding: 0 14px 12px;
  -webkit-overflow-scrolling: touch;
}
.dots-scroll::-webkit-scrollbar { display: none; }

.dots-row {
  display: flex;
  gap: 4px;
  width: max-content;
}

.dot {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--s2);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  position: relative;
  flex-shrink: 0;
}

.dot .d-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  position: absolute;
  top: 2px;
  right: 3px;
  line-height: 1;
}

.dot:active:not(.future) { transform: scale(0.88); }

.dot.done {
  background: var(--accent);
  border-color: var(--accent);
}
.dot.done::after { content: '✓'; color: #fff; font-size: 0.85rem; font-weight: 700; }

.dot.skipped {
  background: var(--s3);
  border-color: var(--muted);
}
.dot.skipped::after { content: '—'; color: var(--muted); font-size: 0.7rem; }

.dot.today-dot {
  border-color: var(--a2);
  box-shadow: 0 0 0 2px var(--glow);
}

.dot.future {
  opacity: 0.2;
  cursor: default;
  pointer-events: none;
}

/* ── Stats screen ── */
.stats-screen { padding: 16px; }

.stats-header {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
  padding: 16px 0 4px;
}

.chart-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
}

.chart-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 16px;
  color: var(--a2);
}

/* Heatmap */
.heatmap {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.hm-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  background: var(--s3);
  transition: background 0.2s;
}

.hm-cell.l1 { background: rgba(124,106,247,0.25); }
.hm-cell.l2 { background: rgba(124,106,247,0.5); }
.hm-cell.l3 { background: rgba(124,106,247,0.75); }
.hm-cell.l4 { background: var(--accent); }

/* Leaderboard */
.leader-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.leader-row:last-child { border-bottom: none; }
.leader-rank {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: var(--muted);
  width: 24px;
  flex-shrink: 0;
}
.leader-rank.gold { color: var(--yellow); }
.leader-name { flex: 1; font-size: 0.88rem; }
.leader-bar-wrap { width: 80px; height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden; }
.leader-bar { height: 100%; background: var(--accent); border-radius: 3px; }
.leader-pct { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--a2); width: 36px; text-align: right; }

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(64px + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: rgba(11,11,14,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s;
  padding-bottom: 4px;
}

.nav-btn.active { color: var(--accent); }

.nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-label { font-size: 0.6rem; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── Install banner ── */
.install-banner {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: linear-gradient(90deg, rgba(124,106,247,0.15), rgba(167,139,250,0.1));
  border-bottom: 1px solid rgba(124,106,247,0.2);
  font-size: 0.82rem;
}

.install-banner.show { display: flex; }
.install-banner .ib-text { flex: 1; color: var(--a2); }
.install-banner button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  cursor: pointer;
}
.install-banner .ib-close {
  background: none;
  color: var(--muted);
  padding: 4px 8px;
  font-size: 0.9rem;
}

/* ── Empty ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state .big { font-size: 3.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; line-height: 1.6; }

/* ── Confetti ── */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -20px;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Install banner -->
  <div class="install-banner" id="installBanner">
    <span class="ib-text">📲 Add to Home Screen for the best experience</span>
    <button onclick="triggerInstall()">Install</button>
    <button class="ib-close" onclick="dismissInstall()">✕</button>
  </div>

  <!-- TODAY screen -->
  <div class="screen active" id="screen-today">
    <div class="topbar">
      <div>
        <div class="topbar-title">Today</div>
        <div class="topbar-sub" id="todayStr"></div>
      </div>
      <div class="month-pill">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="ml" id="monthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="stats-strip">
      <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Habits</div></div>
      <div class="stat"><div class="stat-val" id="sDone">—</div><div class="stat-lbl">Monthly</div></div>
      <div class="stat"><div class="stat-val" id="sBest">0🔥</div><div class="stat-lbl">Best Streak</div></div>
    </div>

    <div class="add-bar">
      <button class="emoji-btn" id="emojiBtn" onclick="togglePicker()">✨</button>
      <input id="habitInput" type="text" placeholder="New habit…" maxlength="36"
        onkeydown="if(event.key==='Enter')addHabit()">
      <button class="add-btn" onclick="addHabit()">Add</button>
    </div>

    <div class="epicker" id="epicker"></div>

    <div class="habit-cards" id="habitCards"></div>
  </div>

  <!-- STATS screen -->
  <div class="screen" id="screen-stats">
    <div class="stats-screen" id="statsContent">
      <div class="stats-header">Your Progress 📈</div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <span class="nav-icon">🌱</span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </button>
  </nav>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
// ── State ────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const EMOJIS = ['✨','💧','🏃','📖','🧘','🛌','🥗','💊','🌳','📝','🎯','💪','🚴','🎨','🎸','🧹','🐕','🌿','✍️','🍎','😴','🏊','🧠','📵','🎬','🧪','🌅','🏋️','🚶','🥤','🦷','☕'];
const COLORS = ['#f87171','#fb923c','#facc15','#4ade80','#34d399','#22d3ee','#60a5fa','#a78bfa','#f472b6'];

let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let pickedEmoji = '✨';
let deferredInstall = null;

function load()    { try { return JSON.parse(localStorage.getItem('ht2_habits') || '[]'); } catch { return []; } }
function save(h)   { localStorage.setItem('ht2_habits', JSON.stringify(h)); }
function loadLogs(){ try { return JSON.parse(localStorage.getItem('ht2_logs')   || '{}'); } catch { return {}; } }
function saveLogs(l){ localStorage.setItem('ht2_logs', JSON.stringify(l)); }
function k(id,y,m,d){ return `${id}_${y}_${m}_${d}`; }
function daysIn(y,m){ return new Date(y, m+1, 0).getDate(); }

// ── Emoji picker ─────────────────────────────────────────────
(function(){
  const ep = document.getElementById('epicker');
  ep.innerHTML = EMOJIS.map(e => `<span onclick="pickEmoji('${e}')">${e}</span>`).join('');
})();

function togglePicker(){
  document.getElementById('epicker').classList.toggle('open');
}
function pickEmoji(e){
  pickedEmoji = e;
  document.getElementById('emojiBtn').textContent = e;
  document.getElementById('epicker').classList.remove('open');
}

// ── Add / Delete ─────────────────────────────────────────────
function addHabit(){
  const inp = document.getElementById('habitInput');
  const name = inp.value.trim();
  if(!name) return;
  const h = load();
  h.push({ id: Date.now().toString(), emoji: pickedEmoji, name, color: COLORS[h.length % COLORS.length] });
  save(h);
  inp.value = '';
  pickedEmoji = '✨';
  document.getElementById('emojiBtn').textContent = '✨';
  renderToday();
  vibrate(10);
}

function deleteHabit(id){
  save(load().filter(h => h.id !== id));
  renderToday();
}

// ── Toggle day ───────────────────────────────────────────────
function toggleDay(hid, y, m, d){
  const logs = loadLogs();
  const key  = k(hid,y,m,d);
  const cur  = logs[key] || 'none';
  const next = cur === 'none' ? 'done' : cur === 'done' ? 'skipped' : 'none';
  logs[key]  = next;
  saveLogs(logs);

  // celebration if done
  if(next === 'done'){
    vibrate([15,10,15]);
    const habits = load();
    const limit  = isToday(y,m) ? new Date().getDate() : daysIn(y,m);
    const streak = getStreak(hid,y,m).streak;
    if(streak > 0 && streak % 7 === 0) confetti();
  }

  renderToday();
}

function isToday(y,m){ const n=new Date(); return y===n.getFullYear()&&m===n.getMonth(); }

// ── Streak calc ──────────────────────────────────────────────
function getStreak(hid, y, m){
  const logs  = loadLogs();
  const today = new Date();
  const limit = isToday(y,m) ? today.getDate() : daysIn(y,m);
  let streak=0, cur=0, max=0;
  for(let d=limit;d>=1;d--){
    if((logs[k(hid,y,m,d)]||'none')==='done') streak++;
    else break;
  }
  for(let d=1;d<=limit;d++){
    if((logs[k(hid,y,m,d)]||'none')==='done'){ cur++; max=Math.max(max,cur); } else cur=0;
  }
  return { streak, max };
}

// ── Render today ─────────────────────────────────────────────
function renderToday(){
  const habits = load();
  const logs   = loadLogs();
  const today  = new Date();
  const days   = daysIn(viewYear, viewMonth);
  const isCur  = isToday(viewYear, viewMonth);
  const limit  = isCur ? today.getDate() : days;

  // label
  document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth].slice(0,3)} ${viewYear}`;
  document.getElementById('todayStr').textContent =
    today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  // stats
  let totalDone=0, totalPoss=0, bestStreak=0;
  habits.forEach(h=>{
    for(let d=1;d<=limit;d++) if((logs[k(h.id,viewYear,viewMonth,d)]||'none')==='done') totalDone++;
    totalPoss += limit;
    const { max } = getStreak(h.id, viewYear, viewMonth);
    if(max > bestStreak) bestStreak = max;
  });
  document.getElementById('sTotal').textContent = habits.length;
  document.getElementById('sDone').textContent  = totalPoss ? Math.round(totalDone/totalPoss*100)+'%' : '—';
  document.getElementById('sBest').textContent  = bestStreak+'🔥';

  // cards
  const container = document.getElementById('habitCards');
  if(!habits.length){
    container.innerHTML = `<div class="empty-state"><div class="big">🌱</div><p>Add your first habit above<br>and start building streaks!</p></div>`;
    return;
  }

  container.innerHTML = habits.map((h,i) => {
    let done = 0;
    for(let d=1;d<=limit;d++) if((logs[k(h.id,viewYear,viewMonth,d)]||'none')==='done') done++;
    const pct = limit > 0 ? Math.round(done/limit*100) : 0;
    const { streak, max } = getStreak(h.id, viewYear, viewMonth);

    const dots = Array.from({length:days},(_,i)=>{
      const d = i+1;
      const isFuture = isCur && d > today.getDate();
      const isTodayDot = isCur && d === today.getDate();
      const st = logs[k(h.id,viewYear,viewMonth,d)] || 'none';
      let cls = 'dot';
      if(isFuture)   cls += ' future';
      else if(st==='done')    cls += ' done';
      else if(st==='skipped') cls += ' skipped';
      if(isTodayDot) cls += ' today-dot';
      return `<div class="${cls}" onclick="toggleDay('${h.id}',${viewYear},${viewMonth},${d})"><span class="d-num">${d}</span></div>`;
    }).join('');

    return `<div class="hcard" style="animation-delay:${i*0.04}s">
      <div class="hcard-top">
        <span class="hcard-emoji">${h.emoji}</span>
        <span class="hcard-name">${h.name}</span>
        <div class="hcard-meta">
          ${streak>1 ? `<span class="streak-badge">${streak}🔥</span>` : ''}
          <span class="pct-text">${pct}%</span>
          <button class="del-btn" onclick="deleteHabit('${h.id}')">✕</button>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="dots-scroll"><div class="dots-row">${dots}</div></div>
    </div>`;
  }).join('');

  // Scroll to today on current month
  if(isCur){
    requestAnimationFrame(()=>{
      const allDotRows = container.querySelectorAll('.dots-scroll');
      allDotRows.forEach(row=>{
        const todayDot = row.querySelector('.today-dot');
        if(todayDot) todayDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      });
    });
  }
}

// ── Render stats ─────────────────────────────────────────────
function renderStats(){
  const habits = load();
  const logs   = loadLogs();
  const today  = new Date();
  const y = today.getFullYear(), m = today.getMonth();
  const days = daysIn(y,m), limit = today.getDate();
  const content = document.getElementById('statsContent');

  if(!habits.length){
    content.innerHTML = `<div class="stats-header">Your Progress 📈</div><div class="empty-state"><div class="big">📊</div><p>Add some habits to see<br>your stats here!</p></div>`;
    return;
  }

  // Heatmap data — last 28 days
  let heatHTML = `<div class="chart-card"><div class="chart-title">Last 28 Days — All Habits</div><div class="heatmap">`;
  for(let i=27;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    const dy = d.getFullYear(), dm = d.getMonth(), dd = d.getDate();
    const total = habits.length;
    const done  = habits.filter(h=>(logs[k(h.id,dy,dm,dd)]||'none')==='done').length;
    const ratio = total ? done/total : 0;
    const lvl   = ratio===0 ? '' : ratio<0.34 ? 'l1' : ratio<0.67 ? 'l2' : ratio<1 ? 'l3' : 'l4';
    heatHTML += `<div class="hm-cell ${lvl}" title="${dy}-${dm+1}-${dd}: ${done}/${total}"></div>`;
  }
  heatHTML += `</div></div>`;

  // Leaderboard
  const ranked = habits.map(h=>{
    let done=0;
    for(let d=1;d<=limit;d++) if((logs[k(h.id,y,m,d)]||'none')==='done') done++;
    const pct = limit > 0 ? Math.round(done/limit*100) : 0;
    const { streak } = getStreak(h.id, y, m);
    return { ...h, pct, streak };
  }).sort((a,b)=>b.pct-a.pct);

  const medals = ['🥇','🥈','🥉'];
  let lbHTML = `<div class="chart-card"><div class="chart-title">This Month — Leaderboard</div>`;
  lbHTML += ranked.map((h,i)=>`
    <div class="leader-row">
      <span class="leader-rank ${i===0?'gold':''}">${medals[i]||i+1}</span>
      <span class="leader-name">${h.emoji} ${h.name}</span>
      <div class="leader-bar-wrap"><div class="leader-bar" style="width:${h.pct}%"></div></div>
      <span class="leader-pct">${h.pct}%</span>
    </div>`).join('');
  lbHTML += `</div>`;

  // Longest streak card
  const topStreak = [...ranked].sort((a,b)=>b.streak-a.streak)[0];
  const streakCard = topStreak ? `<div class="chart-card">
    <div class="chart-title">🔥 Longest Active Streak</div>
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:3rem">${topStreak.emoji}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin:8px 0 4px">${topStreak.name}</div>
      <div style="font-family:'DM Mono',monospace;font-size:2rem;color:var(--yellow);font-weight:500">${topStreak.streak} days</div>
    </div>
  </div>` : '';

  content.innerHTML = `<div class="stats-header">Your Progress 📈</div>${heatHTML}${lbHTML}${streakCard}`;
}

// ── Tab switching ────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('active');
  if(tab==='stats') renderStats();
}

// ── Month nav ────────────────────────────────────────────────
function changeMonth(dir){
  viewMonth += dir;
  if(viewMonth>11){ viewMonth=0; viewYear++; }
  if(viewMonth<0){ viewMonth=11; viewYear--; }
  renderToday();
}

// ── Confetti ─────────────────────────────────────────────────
function confetti(){
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#7c6af7','#a78bfa','#4ade80','#fbbf24','#f472b6','#60a5fa'];
  Array.from({length:30}).forEach((_,i)=>{
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${0.8+Math.random()*1}s;
      animation-delay:${Math.random()*0.3}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(), 1600);
  });
}

function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }

// ── PWA install ──────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBanner').classList.add('show');
});

function triggerInstall(){
  if(!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(()=>{
    deferredInstall = null;
    dismissInstall();
  });
}

function dismissInstall(){
  document.getElementById('installBanner').classList.remove('show');
}

window.addEventListener('appinstalled', ()=>dismissInstall());

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
